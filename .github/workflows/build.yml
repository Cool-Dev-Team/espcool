name: Build ESP32-S3 Firmware

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # ── Step 1: Checkout the repository ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Set up Python (needed by PlatformIO) ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Step 3: Cache PlatformIO dependencies ──
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      # ── Step 4: Install PlatformIO ──
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      # ── Step 5: Build the firmware ──
      - name: Build firmware
        run: pio run -e esp32-s3

      # ── Step 6: Package into zip ──
      - name: Package firmware
        run: python package_firmware.py

      # ── Step 7: Upload build artifact ──
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-firmware-${{ github.sha }}
          path: firmware-package/
          retention-days: 30

      # ── Step 8: Create Release (on tag push) ──
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware-package/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
