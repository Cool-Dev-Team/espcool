name: Build ESP32-C3 Firmware
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install PlatformIO
        run: pip install platformio
      
      - name: Check available ESP32-C3 boards
        run: platformio boards esp32c3
      
      - name: Check platformio.ini
        run: cat platformio.ini
      
      - name: List directory structure
        run: |
          echo "Current directory:"
          pwd
          echo "Files in repo:"
          ls -la
          echo "src directory:"
          ls -la src/
