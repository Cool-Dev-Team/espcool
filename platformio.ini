; ==========================================
; PlatformIO Configuration — ESP32-S3
; ==========================================

; ── Shared settings (inherited by all envs) ──
[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
upload_speed = 921600
board_build.flash_mode = dio
board_build.partitions = default.csv

; USB CDC On Boot (enable serial over USB)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Library dependencies (add yours here)
lib_deps =
    ; WiFi is built-in, no need to declare
    ; Add external libs like:
    ; bblanchon/ArduinoJson@^7.0.0
    ; knolleary/PubSubClient@^2.8

; ── Default build target ──
[env:esp32s3]
; Inherits everything from [env] above
; No overrides needed for the standard DevKitC-1

; ── PSRAM variant (e.g. ESP32-S3-WROOM-2) ──
[env:esp32s3-psram]
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
board_build.arduino.memory_type = qio_opi

; ── 16 MB flash variant ──
[env:esp32s3-16mb]
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
