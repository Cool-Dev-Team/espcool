[env:esp32-s3-devkitm-1]  # New environment for M5Stick S3
platform = espressif32
board = esp32-s3-devkitm-1  # Official PlatformIO board ID for M5Stick S3
framework = arduino
monitor_speed = 115200

# Required library (auto-downloaded by PlatformIO)
lib_deps = m5stack/M5StickC@^0.2.5 khoih-prog/AsyncESP32_SC_ENC_Manager@^1.1.0  # Core library for M5 unified devices (including Stick S3)
